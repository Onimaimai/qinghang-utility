version: '3.8'

services:
  backend:
    build: ./backend
    container_name: utility-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DATABASE_URL=sqlite:////app/data/utility.db
      - FRONTEND_URL=${FRONTEND_URL:-}
    networks:
      - utility-network

  frontend:
    build: ./frontend
    container_name: utility-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - utility-network

networks:
  utility-network:
    driver: bridge

volumes:
  data:
